<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NutriFast | AI-Powered Nutrition & Fasting Assistant</title>
    <base href="/" />

    <!-- Viewport & Device Scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO: Description -->
    <meta
      name="description"
      content="NutriFast helps you optimize your health with smart meal planning, fasting tracking, and personalized progress analytics."
    />

    <!-- SEO: Keywords -->
    <meta
      name="keywords"
      content="NutriFast, meal planner, fasting tracker, health dashboard, nutrition app, AI wellness"
    />

    <!-- SEO: Author -->
    <meta name="author" content="Nokore.dev" />

    <!-- Open Graph (OG) Meta Tags for social media sharing -->
    <meta property="og:title" content="NutriFast | Optimize Your Health" />
    <meta
      property="og:description"
      content="Smart meal planning & fasting tracking powered by AI. Try NutriFast today!"
    />
    <meta property="og:image" content="assets/images/meta-preview.png" />
    <meta property="og:url" content="https://nutrifast.dev" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@Nokoredev" />
    <meta name="twitter:title" content="NutriFast | Optimize Your Health" />
    <meta
      name="twitter:description"
      content="Smart meal planning & fasting tracking powered by AI. Try NutriFast today!"
    />
    <meta name="twitter:image" content="assets/images/meta-preview.png" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/logo-1.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/images/logo-1.png"
    />

    <!-- Font Awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-Z+5hCJn9XemvY+e0M7+pJzkxDkoTfovmL+hXy8+Yi3wvYJ/C2eZ3gfDN4vcjR58Xjzk1XjFGHKUSxKZQnpY4Wg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Optional: Tailwind Preload Optimization -->
    <link rel="preload" href="styles.css" as="style" />
  </head>

  <body
    class="antialiased bg-white text-black dark:bg-[#1a1a1a] dark:text-white"
  >
    <app-root></app-root>
  </body>
</html>
