<main class="main">
  <app-hero
    [title]="title"
    [description]="description"
    [buttonText1]="buttonText1"
    [buttonLink1]="buttonLink1"
    [buttonText2]="buttonText2"
    [buttonLink2]="buttonLink2"
  ></app-hero>

  <app-about></app-about>
  <app-features></app-features>
  <section class="bg-kente-blue py-16 text-white text-center">
    <h2 class="text-3xl font-bold mb-4">AI-Powered Nutrition</h2>
    <p class="max-w-2xl mx-auto mb-6">
      Take the guesswork out of meal planning. Get personalized meal suggestions
      based on your goals — instantly.
    </p>
    <a
      routerLink="/meal-ai"
      class="bg-kente-gold text-black font-semibold px-6 py-3 rounded-full hover:bg-kente-red transition"
    >
      Try AI Meal Suggestions
    </a>
  </section>

  <app-gallery></app-gallery>
  <app-testimonials></app-testimonials>
  <app-call-to-action></app-call-to-action>
</main>
