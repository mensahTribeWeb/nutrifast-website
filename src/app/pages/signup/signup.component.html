<div
  class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-[#FFB600] via-white to-[#009A44] p-4"
>
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 space-y-6">
    <h1 class="text-3xl font-bold text-center text-[#009A44]">
      Create Account
    </h1>

    <form>
      <div class="space-y-4">
        <input
          type="text"
          placeholder="Full Name"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#FFB600]"
        />
        <input
          type="email"
          placeholder="Email"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#FFB600]"
        />
        <input
          type="password"
          placeholder="Password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#FFB600]"
        />
        <input
          type="password"
          placeholder="Confirm Password"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#FFB600]"
        />
      </div>

      <button
        type="submit"
        class="w-full mt-6 bg-[#009A44] text-white font-semibold py-2 px-4 rounded-lg hover:bg-[#007a36] transition"
      >
        Sign Up
      </button>

      <p class="text-sm text-center mt-4">
        Already have an account?
        <a
          routerLink="/login"
          class="text-[#FFB600] font-semibold hover:underline"
          >Login here</a
        >
      </p>
    </form>
  </div>
</div>
