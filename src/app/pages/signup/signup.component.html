<!-- signup.component.html -->
<div
  class="min-h-screen pt-24 bg-gradient-to-br from-[#FFB600] via-white to-[#009A44] px-4"
>
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-8 space-y-6">
    <h1 class="text-3xl font-bold text-center text-[#009A44]">
      Create Account
    </h1>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <div>
          <input
            type="text"
            placeholder="Full Name"
            class="input"
            formControlName="fullName"
            [class.input-error]="shouldShowError('fullName')"
            autocomplete="name"
          />
          <p *ngIf="shouldShowError('fullName')" class="field-error">
            Full name is required.
          </p>
        </div>

        <div>
          <input
            type="email"
            placeholder="Email"
            class="input"
            formControlName="email"
            [class.input-error]="shouldShowError('email')"
            autocomplete="email"
          />
          <p
            *ngIf="shouldShowError('email') && signupForm.get('email')?.hasError('required')"
            class="field-error"
          >
            Email is required.
          </p>
          <p
            *ngIf="shouldShowError('email') && signupForm.get('email')?.hasError('email')"
            class="field-error"
          >
            Enter a valid email address.
          </p>
        </div>

        <div>
          <input
            type="password"
            placeholder="Password"
            class="input"
            formControlName="password"
            [class.input-error]="shouldShowError('password')"
            autocomplete="new-password"
          />
          <p
            *ngIf="shouldShowError('password') && signupForm.get('password')?.hasError('required')"
            class="field-error"
          >
            Password is required.
          </p>
          <p
            *ngIf="shouldShowError('password') && signupForm.get('password')?.hasError('minlength')"
            class="field-error"
          >
            Password must be at least 6 characters.
          </p>
        </div>

        <div>
          <input
            type="password"
            placeholder="Confirm Password"
            class="input"
            formControlName="confirmPassword"
            [class.input-error]="shouldShowError('confirmPassword') || (submitted && signupForm.hasError('passwordMismatch'))"
            autocomplete="new-password"
          />
          <p *ngIf="shouldShowError('confirmPassword')" class="field-error">
            Confirm your password.
          </p>
          <p
            *ngIf="signupForm.hasError('passwordMismatch') && (signupForm.get('confirmPassword')?.touched || submitted)"
            class="field-error"
          >
            Passwords do not match.
          </p>
        </div>
      </div>

      <button type="submit" class="btn mt-6">Sign Up</button>

      <p *ngIf="error" class="text-sm text-center mt-4 text-kente-red">
        {{ error }}
      </p>

      <p class="text-sm text-center mt-4">
        Already have an account?
        <a
          routerLink="/login"
          class="text-[#FFB600] font-semibold hover:underline"
          >Login here</a
        >
      </p>
    </form>
  </div>
</div>
