<!-- signup.component.html -->
<div
  class="min-h-screen pt-24 bg-gradient-to-br from-[#FFB600] via-white to-[#009A44] px-4"
>
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg p-8 space-y-6">
    <h1 class="text-3xl font-bold text-center text-[#009A44]">
      Create Account
    </h1>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <input type="text" placeholder="Full Name" class="input" formControlName="fullName" />
        <input type="email" placeholder="Email" class="input" formControlName="email" />
        <input type="password" placeholder="Password" class="input" formControlName="password" />
        <input
          type="password"
          placeholder="Confirm Password"
          class="input"
          formControlName="confirmPassword"
        />
      </div>

      <button type="submit" class="btn mt-6" [disabled]="signupForm.invalid">Sign Up</button>

      <p *ngIf="error" class="text-sm text-center mt-4 text-kente-red">
        {{ error }}
      </p>

      <p class="text-sm text-center mt-4">
        Already have an account?
        <a
          routerLink="/login"
          class="text-[#FFB600] font-semibold hover:underline"
          >Login here</a
        >
      </p>
    </form>
  </div>
</div>
