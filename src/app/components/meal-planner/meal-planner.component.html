<div class="pt-24 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto">
  <!-- Header -->
  <h1 class="text-3xl font-bold mb-4 text-kente-green text-center">
    Meal Planner
  </h1>
  <p class="mb-6 text-gray-700 text-center">
    Add meals to track your nutrition and let NutriFast recommend smarter plans.
  </p>

  <!-- Toggle Form Button (Centered) -->
  <div class="flex justify-center mb-4">
    <button
      (click)="toggleForm()"
      class="bg-kente-blue text-white px-6 py-2 rounded-md hover:bg-kente-gold transition font-semibold"
    >
      {{ showForm ? "Cancel" : "Add Meal" }}
    </button>
  </div>

  <!-- Meal Input Form -->
  <div
    *ngIf="showForm"
    class="mt-4 bg-white p-4 rounded-md shadow space-y-4 border border-gray-200"
  >
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <input
        type="text"
        [(ngModel)]="meal.name"
        placeholder="Meal Name"
        class="border border-gray-300 px-3 py-2 rounded"
      />
      <input
        type="number"
        [(ngModel)]="meal.calories"
        placeholder="Calories"
        class="border border-gray-300 px-3 py-2 rounded"
      />
      <input
        type="number"
        [(ngModel)]="meal.protein"
        placeholder="Protein (g)"
        class="border border-gray-300 px-3 py-2 rounded"
      />
      <input
        type="number"
        [(ngModel)]="meal.carbs"
        placeholder="Carbs (g)"
        class="border border-gray-300 px-3 py-2 rounded"
      />
      <input
        type="number"
        [(ngModel)]="meal.fat"
        placeholder="Fat (g)"
        class="border border-gray-300 px-3 py-2 rounded"
      />
    </div>

    <!-- Centered Save Button -->
    <div class="flex justify-center">
      <button
        (click)="addMeal()"
        class="bg-kente-green text-white px-6 py-2 rounded hover:bg-kente-blue transition font-semibold"
      >
        Save Meal
      </button>
    </div>
  </div>

  <!-- Meal List Table -->
  <div *ngIf="meals.length" class="mt-10 overflow-x-auto">
    <table class="min-w-full bg-white rounded shadow">
      <thead class="bg-gray-100 text-left">
        <tr>
          <th class="py-3 px-4">Meal</th>
          <th class="py-3 px-4">Calories</th>
          <th class="py-3 px-4">Protein (g)</th>
          <th class="py-3 px-4">Carbs (g)</th>
          <th class="py-3 px-4">Fat (g)</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let m of meals"
          class="border-t hover:bg-gray-50 transition"
        >
          <td class="py-2 px-4 font-medium">{{ m.name }}</td>
          <td class="py-2 px-4">{{ m.calories }}</td>
          <td class="py-2 px-4">{{ m.protein }}</td>
          <td class="py-2 px-4">{{ m.carbs }}</td>
          <td class="py-2 px-4">{{ m.fat }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- No Meals Message -->
  <div
    *ngIf="!meals.length && !showForm"
    class="text-center text-gray-400 mt-10"
  >
    No meals added yet. Use the "Add Meal" button to get started!
  </div>
</div>
