<div class="meal-ai-page">
  <h2 class="meal-ai-title">
    AI Meal Suggestions
  </h2>

  <form
    (ngSubmit)="getSuggestions()"
    class="meal-ai-form"
  >
    <div class="filter-grid">
    <div class="filter-field">
      <label>Max Calories</label>
      <input
        type="number"
        name="calories"
        [(ngModel)]="filters.calories"
        placeholder="700"
      />
    </div>
    <div class="filter-field">
      <label>Min Protein (g)</label>
      <input
        type="number"
        name="protein"
        [(ngModel)]="filters.protein"
        placeholder="15"
      />
    </div>
    <div class="filter-field">
      <label>Max Carbs (g)</label>
      <input
        type="number"
        name="carbs"
        [(ngModel)]="filters.carbs"
        placeholder="Optional"
      />
    </div>
    <div class="filter-field">
      <label>Max Fat (g)</label>
      <input
        type="number"
        name="fat"
        [(ngModel)]="filters.fat"
        placeholder="Optional"
      />
    </div>
    </div>

    <div class="action-row">
      <button type="submit" class="find-button">
        Find Meals
      </button>
    </div>
  </form>

  <div *ngIf="loading" class="status-message">
    Loading recommendations...
  </div>
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <div *ngIf="suggestions.length > 0" class="recommendations">
    <h3>
      Recommended Foods
    </h3>
    <div class="recommendation-grid">
      <app-meal-card
        *ngFor="let meal of suggestions"
        [meal]="meal"
      ></app-meal-card>
    </div>
  </div>
</div>
