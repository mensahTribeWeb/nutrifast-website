<nav class="navbar text-white py-4 mb-4" [class.hidden]="!showNavbar">
  <div class="container mx-auto flex justify-between items-center px-4">
    <!-- Logo Section -->
    <a [routerLink]="'/home'" class="flex items-center space-x-2">
      <img
        src="../../../assets/images/logo-1.png"
        alt="NutriFast Logo"
        class="h-8 lg:h-12"
      />
      <span class="text-lg font-bold">NutriFast</span>
    </a>

    <!-- Mobile Hamburger Menu Button -->
    <div class="block lg:hidden">
      <button (click)="toggleMenu()" class="text-white focus:outline-none">
        <span class="material-icons text-3xl">menu</span>
      </button>
    </div>

    <!-- Navbar Links (Desktop) -->
    <div class="hidden lg:flex space-x-6">
      <a [routerLink]="'/home'" class="hover:text-kente-gold">Home</a>
      <a [routerLink]="'/about'" class="hover:text-kente-gold">About</a>
      <a
        [routerLink]="'/login'"
        *ngIf="!userLoggedIn"
        class="hover:text-kente-gold"
      >
        Login
      </a>
      <a
        [routerLink]="'/dashboard'"
        *ngIf="userLoggedIn"
        class="hover:text-kente-gold"
      >
        Dashboard
      </a>
    </div>

    <!-- Mobile Menu -->
    <div
      *ngIf="showMobileMenu"
      class="absolute top-16 left-0 w-full bg-gray-900 lg:hidden flex flex-col space-y-2 p-4"
    >
      <a [routerLink]="'/home'" class="hover:text-kente-gold">Home</a>
      <a [routerLink]="'/about'" class="hover:text-kente-gold">About</a>
      <a
        [routerLink]="'/login'"
        *ngIf="!userLoggedIn"
        class="hover:text-kente-gold"
      >
        Login
      </a>
      <a
        [routerLink]="'/dashboard'"
        *ngIf="userLoggedIn"
        class="hover:text-kente-gold"
      >
        Dashboard
      </a>
    </div>
  </div>
</nav>
