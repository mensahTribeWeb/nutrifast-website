<nav class="navbar text-white py-4 mb-4" [class.hidden]="!showNavbar">
  <div class="container mx-auto flex justify-between items-center px-4">
    <!-- Logo Section -->
    <a [routerLink]="'/home'" class="flex items-center space-x-2">
      <img
        src="assets/images/logo-1.png"
        alt="NutriFast Logo"
        class="h-8 lg:h-12 w-auto max-w-[8rem]"
        loading="lazy"
      />
      <span class="text-lg font-bold">NutriFast</span>
    </a>

    <!-- Mobile Hamburger Menu Button -->
    <div class="mobile-toggle">
      <button (click)="toggleMenu()" class="text-white focus:outline-none">
        <span class="material-icons text-3xl">
          {{ showMobileMenu ? "close" : "menu" }}
        </span>
      </button>
    </div>

    <!-- Navbar Links (Desktop) -->
    <div class="desktop-menu">
      <a [routerLink]="'/home'" class="hover:text-kente-gold">Home</a>
      <a [routerLink]="'/about'" class="hover:text-kente-gold">About</a>
      <a
        [routerLink]="'/login'"
        *ngIf="!userLoggedIn"
        class="hover:text-kente-gold"
      >
        Login
      </a>
      <a
        [routerLink]="'/dashboard'"
        *ngIf="userLoggedIn"
        class="hover:text-kente-gold"
      >
        Dashboard
      </a>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="showMobileMenu" class="mobile-menu">
      <a
        [routerLink]="'/home'"
        class="hover:text-kente-gold"
        (click)="closeMenu()"
        >Home</a
      >
      <a
        [routerLink]="'/about'"
        class="hover:text-kente-gold"
        (click)="closeMenu()"
        >About</a
      >
      <a
        [routerLink]="'/login'"
        *ngIf="!userLoggedIn"
        class="hover:text-kente-gold"
        (click)="closeMenu()"
        >Login</a
      >
      <a
        [routerLink]="'/dashboard'"
        *ngIf="userLoggedIn"
        class="hover:text-kente-gold"
        (click)="closeMenu()"
        >Dashboard</a
      >
    </div>
  </div>
</nav>
