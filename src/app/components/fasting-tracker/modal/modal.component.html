<div class="modal-overlay" *ngIf="isModalVisible">
  <div class="modal-content">
    <h2>Custom Fasting Options</h2>
    <form (ngSubmit)="saveFasting()">
      <div class="form-group">
        <label for="startTime">Start Time:</label>
        <input
          id="startTime"
          type="datetime-local"
          [(ngModel)]="startTime"
          name="startTime"
          required
        />
      </div>

      <div class="form-group">
        <label for="endTime">End Time:</label>
        <input
          id="endTime"
          type="datetime-local"
          [(ngModel)]="endTime"
          name="endTime"
          required
        />
      </div>

      <div class="form-group">
        <label for="weight">Weight (lbs):</label>
        <input
          id="weight"
          type="number"
          [(ngModel)]="weight"
          name="weight"
          required
          min="0"
        />
      </div>

      <div class="modal-actions">
        <button type="submit">Save Fasting</button>
        <button type="button" (click)="cancelModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>
