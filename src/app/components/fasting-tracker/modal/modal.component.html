<div class="modal-overlay">
  <section class="modal-content" role="dialog" aria-modal="true">
    <header>
      <h2>Custom Fasting Schedule</h2>
      <p>Set your fasting window and current weight.</p>
    </header>

    <form (ngSubmit)="saveFasting()">
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input
          id="startTime"
          type="datetime-local"
          [(ngModel)]="startTime"
          name="startTime"
          required
        />
      </div>

      <div class="form-group">
        <label for="endTime">End Time</label>
        <input
          id="endTime"
          type="datetime-local"
          [(ngModel)]="endTime"
          name="endTime"
          required
        />
      </div>

      <div class="form-group">
        <label for="weight">Weight (lbs)</label>
        <input
          id="weight"
          type="number"
          [(ngModel)]="weight"
          name="weight"
          required
          min="0"
        />
      </div>

      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

      <div class="modal-actions">
        <button type="submit">Save Schedule</button>
        <button type="button" (click)="cancelModal()">Cancel</button>
      </div>
    </form>
  </section>
</div>
